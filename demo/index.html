<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MogTerm Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      color: #ccc;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
      min-height: 100vh;
    }
    h1 {
      font-size: 1.4rem;
      margin-bottom: 8px;
      color: #7af;
    }
    .subtitle {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 16px;
    }
    #terminal-container {
      border: 1px solid #444;
      border-radius: 6px;
      width: fit-content;
      margin-bottom: 16px;
    }
    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 16px;
    }
    button {
      padding: 6px 14px;
      border: 1px solid #555;
      border-radius: 4px;
      background: #222;
      color: #ccc;
      cursor: pointer;
      font-size: 0.85rem;
    }
    button:hover { background: #333; border-color: #7af; }
    #input-area {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 680px;
    }
    #raw-input {
      flex: 1;
      padding: 8px;
      border: 1px solid #555;
      border-radius: 4px;
      background: #1e1e1e;
      color: #ccc;
      font-family: monospace;
      font-size: 0.9rem;
    }
    #raw-input:focus { outline: none; border-color: #7af; }
    .info {
      margin-top: 16px;
      font-size: 0.8rem;
      color: #666;
      max-width: 680px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>MogTerm Demo</h1>
  <p class="subtitle">Virtual terminal emulator engine</p>

  <div id="terminal-container"></div>

  <div class="controls">
    <button onclick="demoColors()">Color Demo</button>
    <button onclick="demoAsciiArt()">ASCII Art</button>
    <button onclick="demoCursorMove()">Cursor Movement</button>
    <button onclick="demoSGR()">Text Attributes</button>
    <button onclick="demoProgress()">Progress Bar</button>
    <button onclick="demoReset()">Reset</button>
  </div>

  <div id="input-area">
    <input id="raw-input" type="text" placeholder="Type raw input (use \e for ESC, \n for newline)..." />
    <button onclick="sendRawInput()">Send</button>
  </div>

  <p class="info">
    Feed raw text or escape sequences into the MogTerm engine. Use \e for ESC (0x1b), \n for newline, \t for tab.
  </p>

  <script type="module">
    import { Terminal } from '../src/terminal.js';
    import { Renderer } from '../src/renderer.js';

    const term = new Terminal(80, 24);
    const container = document.getElementById('terminal-container');
    const renderer = new Renderer(container, term);

    // Wire onResize to notify backend/PTY of dimension changes.
    // In a full integration this would send a resize message over
    // WebSocket or similar transport (equivalent to SIGWINCH).
    renderer.onResize = (cols, rows) => {
      console.log(`[resize] cols=${cols} rows=${rows}`);
      // If a WebSocket connection to a PTY backend exists, send:
      //   ws.send(JSON.stringify({ type: 'resize', cols, rows }));
    };

    // Initial render
    renderer.render();

    // Expose globally for button handlers
    window.term = term;
    window.renderer = renderer;

    // Write + render helper
    window.termWrite = function(data) {
      term.write(data);
      renderer.render();
    };

    // ── Demo functions ───────────────────────────────────

    window.demoColors = function() {
      term.reset();
      let out = '\x1b[1;37mANSI Color Palette\x1b[0m\r\n\r\n';

      // Standard colors (0-7)
      out += ' Standard:  ';
      for (let i = 0; i < 8; i++) {
        out += `\x1b[4${i}m  ${i} \x1b[0m `;
      }
      out += '\r\n';

      // Bright colors (8-15)
      out += ' Bright:    ';
      for (let i = 0; i < 8; i++) {
        out += `\x1b[10${i}m  ${i + 8} \x1b[0m `;
      }
      out += '\r\n\r\n';

      // Foreground colors
      out += ' FG colors: ';
      for (let i = 30; i <= 37; i++) {
        out += `\x1b[${i}m Text \x1b[0m`;
      }
      out += '\r\n';
      out += ' Bright FG: ';
      for (let i = 90; i <= 97; i++) {
        out += `\x1b[${i}m Text \x1b[0m`;
      }
      out += '\r\n\r\n';

      // 256-color sample
      out += ' 256-color gradient:\r\n ';
      for (let i = 16; i < 52; i++) {
        out += `\x1b[48;5;${i}m  \x1b[0m`;
      }
      out += '\r\n ';
      for (let i = 52; i < 88; i++) {
        out += `\x1b[48;5;${i}m  \x1b[0m`;
      }
      out += '\r\n';

      termWrite(out);
    };

    window.demoAsciiArt = function() {
      term.reset();
      const art = [
        '\x1b[36m',
        '  __  __             _____                   ',
        ' |  \\/  | ___   __ |_   _|__ _ __ _ __ ___  ',
        ' | |\\/| |/ _ \\ / _` || |/ _ \\ \'__| \'_ ` _ \\ ',
        ' | |  | | (_) | (_| || |  __/ |  | | | | | |',
        ' |_|  |_|\\___/ \\__, ||_|\\___|_|  |_| |_| |_|',
        '               |___/                         ',
        '\x1b[0m',
        '',
        '\x1b[33m  Virtual Terminal Emulator Engine v0.1.0\x1b[0m',
        '',
      ];
      termWrite(art.join('\r\n') + '\r\n');
    };

    window.demoCursorMove = function() {
      term.reset();
      let out = '';
      // Draw a box using cursor movement
      out += '\x1b[2;5H\x1b[36m+' + '-'.repeat(30) + '+';
      for (let i = 0; i < 8; i++) {
        out += `\x1b[${3 + i};5H|`;
        out += `\x1b[${3 + i};36H|`;
      }
      out += '\x1b[11;5H+' + '-'.repeat(30) + '+';

      // Text inside the box
      out += '\x1b[5;10H\x1b[1;33mCursor Movement Demo\x1b[0m';
      out += '\x1b[7;10H\x1b[32mCUP, CUU, CUD, CUF, CUB\x1b[0m';
      out += '\x1b[8;10H\x1b[32mworking correctly!\x1b[0m';

      out += '\x1b[13;1H';
      termWrite(out);
    };

    window.demoSGR = function() {
      term.reset();
      let out = '\x1b[1;37mText Attribute Demos:\x1b[0m\r\n\r\n';
      out += '  \x1b[1mBold text\x1b[0m\r\n';
      out += '  \x1b[2mDim text\x1b[0m\r\n';
      out += '  \x1b[3mItalic text\x1b[0m\r\n';
      out += '  \x1b[4mUnderlined text\x1b[0m\r\n';
      out += '  \x1b[7mInverse text\x1b[0m\r\n';
      out += '  \x1b[9mStrikethrough text\x1b[0m\r\n';
      out += '  \x1b[1;3;4;31mBold + Italic + Underline + Red\x1b[0m\r\n';
      out += '  \x1b[1;32;44mBold Green on Blue\x1b[0m\r\n';
      out += '\r\n';
      out += '  \x1b[38;2;255;100;50mTrue color (RGB 255,100,50)\x1b[0m\r\n';
      out += '  \x1b[48;2;0;80;160;38;2;255;255;255m White on Teal (truecolor) \x1b[0m\r\n';
      termWrite(out);
    };

    window.demoProgress = function() {
      term.reset();
      termWrite('Downloading file...\r\n\r\n');

      let progress = 0;
      const timer = setInterval(() => {
        progress += 3;
        if (progress > 100) progress = 100;
        const filled = Math.floor(progress / 2);
        const empty = 50 - filled;
        const bar = '\x1b[2;1H  [\x1b[32m' + '#'.repeat(filled) + '\x1b[0m' +
          '.'.repeat(empty) + '] ' + String(progress).padStart(3) + '%';
        termWrite(bar);
        if (progress >= 100) {
          clearInterval(timer);
          termWrite('\r\n\r\n  \x1b[1;32mComplete!\x1b[0m\r\n');
        }
      }, 60);
    };

    window.demoReset = function() {
      term.reset();
      renderer.render();
    };

    window.sendRawInput = function() {
      const input = document.getElementById('raw-input');
      let data = input.value;
      // Parse escape sequences in user input
      data = data.replace(/\\e/g, '\x1b')
                 .replace(/\\n/g, '\n')
                 .replace(/\\r/g, '\r')
                 .replace(/\\t/g, '\t');
      termWrite(data);
      input.value = '';
    };

    // Enter key sends input
    document.getElementById('raw-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        sendRawInput();
      }
    });
  </script>
</body>
</html>
