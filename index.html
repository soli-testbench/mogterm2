<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mogterm</title>
  <link rel="stylesheet" href="src/mogterm.css">
</head>
<body style="background:#2d2d2d;display:flex;justify-content:center;padding:40px;">
  <div id="terminal" style="width:700px;"></div>
  <script src="src/mogterm.js"></script>
  <script>
    const term = new Mogterm(document.getElementById('terminal'));
    term.writeLine('Welcome to mogterm.');
    term.onCommand = function (cmd) {
      if (cmd.trim()) {
        term.writeLine('> ' + cmd);
      }
    };
  </script>
</body>
</html>
